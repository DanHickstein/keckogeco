# keckogeco configuration — EXAMPLE
#
# Copy this file to keckogeco.toml (same directory) and fill in the real
# addresses for your installation. keckogeco.toml is git-ignored: real COM
# ports, VISA addresses, hostnames, and credentials must never be committed.
#
# `python -m keckogeco.discovery` can discover the instruments on the rack and write/update
# the [devices.*] blocks for you.
#
# Config search order:
#   1. --config PATH command-line flag
#   2. KECKOGECO_CONFIG environment variable
#   3. ~/.keckogeco/keckogeco.toml
#   4. ./config/keckogeco.toml (relative to the current directory)

[server]
host = "0.0.0.0"
port = 8000
# Optional static bearer token for the REST API. Empty string disables auth.
api_token = ""

[logging]
# Directory for application logs and telemetry CSVs.
dir = "logs"
level = "INFO"

[alerts]
enabled = false
# SMTP settings go here when alerts are enabled (Phase 4).
# Credentials belong in the OS keyring or the git-ignored secrets.toml,
# never in this file's committed example.

# ---------------------------------------------------------------------------
# Devices. One block per instrument. Keys:
#   driver   – module name in keckogeco.drivers (required)
#   address  – VISA resource / COM port / host:port, per the transport (required)
#   enabled  – set false to skip the device entirely (default true)
#   name     – human-readable label for logs and GUIs (default: block name)
# Extra keys (baud_rate, usb_serial, model, ...) are passed to the driver.
# ---------------------------------------------------------------------------

[devices.edfa27]
driver = "amonics_edfa"
address = "ASRL13::INSTR"
name = "Amonics 27 dBm EDFA"
# Fixed control mode, "ACC" or "APC". Set it: the PM-13/PM-23 units never
# answer the :MODE:SW query (silent timeout), so without this option the
# driver probes once at first use and falls back to ACC.
mode = "APC"

[devices.edfa13]
driver = "amonics_edfa"
address = "ASRL4::INSTR"
name = "Amonics 13 dBm EDFA"
mode = "ACC"

[devices.edfa23]
driver = "amonics_edfa"
address = "ASRL10::INSTR"
name = "Amonics 23 dBm EDFA"
mode = "ACC"

[devices.ptamp]
driver = "pritel_amp"
address = "ASRL6::INSTR"
name = "Pritel high-power amplifier"

[devices.rio]
driver = "orion_laser"
address = "ASRL12::INSTR"
name = "ORION/RIO seed laser"

[devices.rf_osc_psu]
driver = "instek_psu"
address = "ASRL5::INSTR"
model = "GPD-4303S"
name = "RF oscillator DC supply"
channel = 2    # GPD channel feeding the RF oscillator (per minicomb setup)

[devices.rf_amp_psu]
driver = "instek_psu"
address = "ASRL8::INSTR"
model = "GPP-1326"
name = "RF amplifier DC supply"

[devices.rb_clock]
driver = "rb_clock"
address = "ASRL9::INSTR"
name = "SRS FS725 Rb standard"

[devices.arduino_relay]
driver = "arduino_relay"
address = "COM3"
name = "Interlock latching relay"

[devices.srs]
driver = "srs_sim900"
address = "ASRL21::INSTR"
name = "SRS SIM900 mainframe"
im_slot = 5    # SIM960 slot used for the intensity-modulator bias lock

[devices.waveshaper1]
driver = "waveshaper"
address = "SN201904"
name = "WaveShaper (flattener)"

[devices.waveshaper2]
driver = "waveshaper"
address = "SN201905"
name = "WaveShaper (D2)"

[devices.tec_ppln]
driver = "tec_tc720"
address = "COM16"
name = "TC-720 TEC (PPLN)"

[devices.tec_wvg]
driver = "tec_tc720"
address = "COM22"
name = "TC-720 TEC (octave waveguide)"

# USB-2408 boards are addressed by USB serial number (shown in the mcculw
# inventory / on the unit label); InstaCal configuration is not needed.
[devices.daq]
driver = "usb2408"
address = "205F843"
name = "USB-2408 thermocouple DAQ (rack)"

[devices.daq_eocb]
driver = "usb2408"
address = "205F82F"
name = "USB-2408 thermocouple DAQ (optical table)"

[devices.pendulum]
driver = "pendulum_cnt90"
address = "GPIB0::10::INSTR"
name = "Pendulum CNT-90 counter"

[devices.osa]
driver = "agilent_86142b"
address = "GPIB0::30::INSTR"
name = "Agilent 86142B OSA"

# Three OZ Optics VOAs (1310 / 1550 / 2000 nm units). Which port is which
# wavelength is not yet known, so keep neutral (e.g. unit-serial-based) keys.
# Once a unit is identified, rename its block to voa1310/voa1550/voa2000 --
# that key is what binds the LFC_VOAxxxx_ATTEN keyword (comb/controller.py).
[devices.voa_a]
driver = "oz_voa"
address = "ASRL7::INSTR"
name = "OZ Optics VOA (wavelength not yet identified)"

[devices.voa_b]
driver = "oz_voa"
address = "ASRL11::INSTR"
name = "OZ Optics VOA (wavelength not yet identified)"
enabled = false    # enable once python -m keckogeco.discovery confirms the port

[devices.voa_c]
driver = "oz_voa"
address = "ASRL15::INSTR"
name = "OZ Optics VOA (wavelength not yet identified)"
enabled = false    # enable once python -m keckogeco.discovery confirms the port

[devices.hk_shutter]
driver = "hk_shutter"
address = "COM8"     # rack-verified 2026-07; the old code's COM12 is the 2x2 switch
name = "HK shutter (SC10 style)"

[devices.switch2x2]
driver = "agiltron_switch"
address = "COM12"
name = "Agiltron 2x2 switch (1 = YJ, 2 = HK)"

[devices.clarity]
driver = "clarity"
address = "ASRL23::INSTR"
name = "Wavelength References Clarity laser"

[devices.fg1]
driver = "keysight_fg33500"
address = "USB0::0x0957::0x2807::MY59003824::INSTR"
name = "Keysight 33512B function generator #1"

[devices.fg2]
driver = "keysight_fg33500"
address = "USB0::0x0957::0x2807::MY59003825::INSTR"
name = "Keysight 33512B function generator #2"
enabled = false    # enable once python -m keckogeco.discovery confirms the address
