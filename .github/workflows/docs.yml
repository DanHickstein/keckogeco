name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[docs]"
      - name: Build HTML
        run: sphinx-build -M html docs docs/_build --fail-on-warning
      - name: Build PDF
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq latexmk texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended
          sphinx-build -M latexpdf docs docs/_build
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: keckogeco-docs-pdf
          path: docs/_build/latex/keckogeco.pdf
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
