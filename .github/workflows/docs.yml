name: Docs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[docs]"
      - name: Build HTML
        run: sphinx-build -M html docs docs/_build --fail-on-warning
      - name: Build PDF
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq latexmk texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended
          sphinx-build -M latexpdf docs docs/_build
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: keckogeco-docs-pdf
          path: docs/_build/latex/keckogeco.pdf
      - name: Add PDF to HTML site
        run: cp docs/_build/latex/keckogeco.pdf docs/_build/html/keckogeco.pdf
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
